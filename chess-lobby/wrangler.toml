name = "chess-lobby"
main = "src/worker.ts"
compatibility_date = "2026-04-01"

# Durable Object binding. The Lobby class is a single global DO
# (addressed by idFromName("global")) that tracks live presence +
# in-flight challenges via the WebSocket Hibernation API.
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

# New DOs in 2026 must use the SQLite-backed storage class.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Lobby"]

# NOTE: FIREBASE_PROJECT_ID is intentionally NOT set here.
# Configure it as a secret on deploy:
#   npx wrangler secret put FIREBASE_PROJECT_ID
# It must match the Firebase project ID the Android app uses
# (see google-services.json -> project_info.project_id).
[vars]

# D1 database for the class marks comparison feature.
# Schema in migrations/. Run new migrations via:
#   npx wrangler d1 execute class_marks_db --remote --file migrations/000N_*.sql
[[d1_databases]]
binding = "CLASS_MARKS_DB"
database_name = "class_marks_db"
database_id = "b3daf7d3-5e5e-475c-bf23-92be944afda2"

# PWA server-side cron polling. Cron handler in src/pwa_cron.ts iterates
# the pwa_creds table in chunks of 16 (subrequest budget) and refreshes
# class_marks for dormant PWA users. Every 10 min = 144 ticks/day × 16
# users = 2304 syncs/day. Tweak interval if user count outgrows this.
#
# PWA_CRED_KEY is set via:
#   npx wrangler secret put PWA_CRED_KEY
# (base64 of 32 random bytes; used to AES-GCM encrypt stored SIS passwords)
[triggers]
crons = ["*/10 * * * *"]
